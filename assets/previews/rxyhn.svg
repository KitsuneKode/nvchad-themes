<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420">
  <rect width="100%" height="100%" fill="#061115"/>
  <text font-family="ui-monospace,Menlo,Consolas,monospace" font-size="13">
    <tspan x="16" dy="29"><tspan fill="#3B464A">// NvChad theme preview sample</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#C488EC">import</tspan><tspan fill="#D9D7D6"> { ThemeSpec } </tspan><tspan fill="#C488EC">from</tspan><tspan fill="#D9D7D6"> </tspan><tspan fill="#82C29C">&quot;./types&quot;</tspan><tspan fill="#D9D7D6">;</tspan></tspan>
    <tspan x="16" dy="19.5"></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#3B464A">/**</tspan><tspan fill="#455054"> Greets the user with syntax-rich highlighting </tspan><tspan fill="#3B464A">*/</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#C488EC">export</tspan><tspan fill="#D9D7D6"> </tspan><tspan fill="#E9967E">function</tspan><tspan fill="#D9D7D6"> </tspan><tspan fill="#79AAEB">greet</tspan><tspan fill="#D9D7D6">(</tspan><tspan fill="#F26E74">name</tspan><tspan fill="#D9D7D6">: </tspan><tspan fill="#E9967E">string</tspan><tspan fill="#D9D7D6">, </tspan><tspan fill="#F26E74">count</tspan><tspan fill="#D9D7D6"> = </tspan><tspan fill="#ECD28B">1</tspan><tspan fill="#D9D7D6">): </tspan><tspan fill="#E9967E">string</tspan><tspan fill="#D9D7D6"> {</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#D9D7D6">  </tspan><tspan fill="#E9967E">const</tspan><tspan fill="#D9D7D6"> message = </tspan><tspan fill="#82C29C">`Hello, ${</tspan><tspan fill="#D9D7D6">name</tspan><tspan fill="#82C29C">}!`</tspan><tspan fill="#D9D7D6">;</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#D9D7D6">  </tspan><tspan fill="#C488EC">if</tspan><tspan fill="#D9D7D6"> (count &gt; </tspan><tspan fill="#ECD28B">1</tspan><tspan fill="#D9D7D6">) {</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#D9D7D6">    </tspan><tspan fill="#C488EC">return</tspan><tspan fill="#D9D7D6"> </tspan><tspan fill="#79AAEB">Array</tspan><tspan fill="#D9D7D6">(count)</tspan><tspan fill="#D9D7D6">.</tspan><tspan fill="#79AAEB">fill</tspan><tspan fill="#D9D7D6">(message)</tspan><tspan fill="#D9D7D6">.</tspan><tspan fill="#79AAEB">join</tspan><tspan fill="#D9D7D6">(</tspan><tspan fill="#82C29C">&quot; &quot;</tspan><tspan fill="#D9D7D6">);</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#D9D7D6">  }</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#D9D7D6">  </tspan><tspan fill="#C488EC">return</tspan><tspan fill="#D9D7D6"> message;</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#D9D7D6">}</tspan></tspan>
    <tspan x="16" dy="19.5"></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#E9967E">const</tspan><tspan fill="#D9D7D6"> numbers = [</tspan><tspan fill="#ECD28B">1</tspan><tspan fill="#D9D7D6">, </tspan><tspan fill="#ECD28B">2.5</tspan><tspan fill="#D9D7D6">, </tspan><tspan fill="#ECD28B">0xff</tspan><tspan fill="#D9D7D6">];</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#E9967E">const</tspan><tspan fill="#D9D7D6"> pattern =</tspan><tspan fill="#6791C9"> /</tspan><tspan fill="#C488EC">^</tspan><tspan fill="#ECD28B">[a-z]</tspan><tspan fill="#D9D7D6">+</tspan><tspan fill="#C488EC">$</tspan><tspan fill="#6791C9">/</tspan><tspan fill="#D9D7D6">;</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#E9967E">const</tspan><tspan fill="#D9D7D6"> ok: </tspan><tspan fill="#E9967E">boolean</tspan><tspan fill="#D9D7D6"> = numbers.length &gt; </tspan><tspan fill="#ECD28B">0</tspan><tspan fill="#D9D7D6">;</tspan></tspan>
    <tspan x="16" dy="19.5"></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#E9967E">class</tspan><tspan fill="#D9D7D6"> </tspan><tspan fill="#E9967E">ThemeBuilder</tspan><tspan fill="#D9D7D6"> {</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#D9D7D6">  </tspan><tspan fill="#C488EC">readonly</tspan><tspan fill="#D9D7D6"> id: </tspan><tspan fill="#E9967E">string</tspan><tspan fill="#D9D7D6">;</tspan></tspan>
    <tspan x="16" dy="19.5"></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#D9D7D6">  </tspan><tspan fill="#E9967E">constructor</tspan><tspan fill="#D9D7D6">(</tspan><tspan fill="#F26E74">id</tspan><tspan fill="#D9D7D6">: </tspan><tspan fill="#E9967E">string</tspan><tspan fill="#D9D7D6">) {</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#D9D7D6">    </tspan><tspan fill="#ECD28B">this</tspan><tspan fill="#D9D7D6">.</tspan><tspan fill="#F26E74">id</tspan><tspan fill="#D9D7D6"> = id;</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#D9D7D6">  }</tspan></tspan>
    <tspan x="16" dy="19.5"></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#D9D7D6">  </tspan><tspan fill="#79AAEB">build</tspan><tspan fill="#D9D7D6">(</tspan><tspan fill="#F26E74">theme</tspan><tspan fill="#D9D7D6">: </tspan><tspan fill="#E9967E">ThemeSpec</tspan><tspan fill="#D9D7D6">): </tspan><tspan fill="#E9967E">Record</tspan><tspan fill="#D9D7D6">&lt;</tspan><tspan fill="#E9967E">string</tspan><tspan fill="#D9D7D6">, </tspan><tspan fill="#E9967E">string</tspan><tspan fill="#D9D7D6">&gt; {</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#D9D7D6">    </tspan><tspan fill="#C488EC">return</tspan><tspan fill="#D9D7D6"> { </tspan><tspan fill="#F26E74">background</tspan><tspan fill="#D9D7D6">: theme.base30.</tspan><tspan fill="#F26E74">black</tspan><tspan fill="#D9D7D6"> };</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#D9D7D6">  }</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#D9D7D6">}</tspan></tspan>
    <tspan x="16" dy="19.5"></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#C488EC">export</tspan><tspan fill="#D9D7D6"> </tspan><tspan fill="#C488EC">default</tspan><tspan fill="#D9D7D6"> new </tspan><tspan fill="#79AAEB">ThemeBuilder</tspan><tspan fill="#D9D7D6">(</tspan><tspan fill="#82C29C">&quot;kanagawa&quot;</tspan><tspan fill="#D9D7D6">);</tspan></tspan>
    <tspan x="16" dy="19.5"></tspan>
  </text>
</svg>