<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420">
  <rect width="100%" height="100%" fill="#1F1F28"/>
  <text font-family="ui-monospace,Menlo,Consolas,monospace" font-size="13">
    <tspan x="16" dy="29"><tspan fill="#4C4C55">// NvChad theme preview sample</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#A48EC7">import</tspan><tspan fill="#DCD7BA"> { </tspan><tspan fill="#C8C3A6">ThemeSpec</tspan><tspan fill="#DCD7BA"> } </tspan><tspan fill="#9C86BF">from</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#98BB6C">&quot;./types&quot;</tspan><tspan fill="#DCD7BA">;</tspan></tspan>
    <tspan x="16" dy="19.5"></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#4C4C55">/**</tspan><tspan fill="#53535C"> Greets the user with syntax-rich highlighting </tspan><tspan fill="#4C4C55">*/</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#9C86BF">export</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#DCA561">function</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#7E9CD8">greet</tspan><tspan fill="#DCD7BA">(</tspan><tspan fill="#D8616B">name</tspan><tspan fill="#C8C3A6">:</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#DCA561">string</tspan><tspan fill="#DCD7BA">, </tspan><tspan fill="#D8616B">count</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#C8C3A6">=</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#D27E99">1</tspan><tspan fill="#DCD7BA">)</tspan><tspan fill="#C8C3A6">:</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#DCA561">string</tspan><tspan fill="#DCD7BA"> {</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#DCD7BA">  </tspan><tspan fill="#DCA561">const</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#C8C3A6">message</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#C8C3A6">=</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#98BB6C">`Hello, ${</tspan><tspan fill="#C8C3A6">name</tspan><tspan fill="#98BB6C">}!`</tspan><tspan fill="#DCD7BA">;</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#DCD7BA">  </tspan><tspan fill="#9C86BF">if</tspan><tspan fill="#DCD7BA"> (</tspan><tspan fill="#C8C3A6">count</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#C8C3A6">&gt;</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#D27E99">1</tspan><tspan fill="#DCD7BA">) {</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#DCD7BA">    </tspan><tspan fill="#9C86BF">return</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#7E9CD8">Array</tspan><tspan fill="#DCD7BA">(</tspan><tspan fill="#C8C3A6">count</tspan><tspan fill="#DCD7BA">)</tspan><tspan fill="#C8C3A6">.</tspan><tspan fill="#7E9CD8">fill</tspan><tspan fill="#DCD7BA">(</tspan><tspan fill="#C8C3A6">message</tspan><tspan fill="#DCD7BA">)</tspan><tspan fill="#C8C3A6">.</tspan><tspan fill="#7E9CD8">join</tspan><tspan fill="#DCD7BA">(</tspan><tspan fill="#98BB6C">&quot; &quot;</tspan><tspan fill="#DCD7BA">);</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#DCD7BA">  }</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#DCD7BA">  </tspan><tspan fill="#9C86BF">return</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#C8C3A6">message</tspan><tspan fill="#DCD7BA">;</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#DCD7BA">}</tspan></tspan>
    <tspan x="16" dy="19.5"></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#DCA561">const</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#C8C3A6">numbers</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#C8C3A6">=</tspan><tspan fill="#DCD7BA"> [</tspan><tspan fill="#D27E99">1</tspan><tspan fill="#DCD7BA">, </tspan><tspan fill="#D27E99">2.5</tspan><tspan fill="#DCD7BA">, </tspan><tspan fill="#D27E99">0xff</tspan><tspan fill="#DCD7BA">];</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#DCA561">const</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#C8C3A6">pattern</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#C8C3A6">=</tspan><tspan fill="#7FB4CA"> /</tspan><tspan fill="#9C86BF">^</tspan><tspan fill="#FFA066">[a-z]</tspan><tspan fill="#C8C3A6">+</tspan><tspan fill="#9C86BF">$</tspan><tspan fill="#7FB4CA">/</tspan><tspan fill="#DCD7BA">;</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#DCA561">const</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#C8C3A6">ok:</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#DCA561">boolean</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#C8C3A6">=</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#C8C3A6">numbers.length</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#C8C3A6">&gt;</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#D27E99">0</tspan><tspan fill="#DCD7BA">;</tspan></tspan>
    <tspan x="16" dy="19.5"></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#DCA561">class</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#DCA561">ThemeBuilder</tspan><tspan fill="#DCD7BA"> {</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#DCD7BA">  </tspan><tspan fill="#9C86BF">readonly</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#C8C3A6">id:</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#DCA561">string</tspan><tspan fill="#DCD7BA">;</tspan></tspan>
    <tspan x="16" dy="19.5"></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#DCD7BA">  </tspan><tspan fill="#DCA561">constructor</tspan><tspan fill="#DCD7BA">(</tspan><tspan fill="#D8616B">id</tspan><tspan fill="#C8C3A6">:</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#DCA561">string</tspan><tspan fill="#DCD7BA">) {</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#DCD7BA">    </tspan><tspan fill="#FFA066">this</tspan><tspan fill="#C8C3A6">.</tspan><tspan fill="#D8616B">id</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#C8C3A6">=</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#C8C3A6">id</tspan><tspan fill="#DCD7BA">;</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#DCD7BA">  }</tspan></tspan>
    <tspan x="16" dy="19.5"></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#DCD7BA">  </tspan><tspan fill="#7E9CD8">build</tspan><tspan fill="#DCD7BA">(</tspan><tspan fill="#D8616B">theme</tspan><tspan fill="#C8C3A6">:</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#DCA561">ThemeSpec</tspan><tspan fill="#DCD7BA">)</tspan><tspan fill="#C8C3A6">:</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#DCA561">Record</tspan><tspan fill="#DCD7BA">&lt;</tspan><tspan fill="#DCA561">string</tspan><tspan fill="#DCD7BA">, </tspan><tspan fill="#DCA561">string</tspan><tspan fill="#DCD7BA">&gt; {</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#DCD7BA">    </tspan><tspan fill="#9C86BF">return</tspan><tspan fill="#DCD7BA"> { background: </tspan><tspan fill="#C8C3A6">theme.base30.</tspan><tspan fill="#D8616B">black</tspan><tspan fill="#DCD7BA"> };</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#DCD7BA">  }</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#DCD7BA">}</tspan></tspan>
    <tspan x="16" dy="19.5"></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#9C86BF">export</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#9C86BF">default</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#C8C3A6">new</tspan><tspan fill="#DCD7BA"> </tspan><tspan fill="#7E9CD8">ThemeBuilder</tspan><tspan fill="#DCD7BA">(</tspan><tspan fill="#98BB6C">&quot;kanagawa&quot;</tspan><tspan fill="#DCD7BA">);</tspan></tspan>
    <tspan x="16" dy="19.5"></tspan>
  </text>
</svg>