<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420"><rect width="100%" height="100%" fill="#1e222a"/><text font-family="ui-monospace,Menlo,Consolas,monospace" font-size="13"><tspan x="16" dy="29"><tspan fill="#565C64">// NvChad theme preview sample</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#C678DD">import</tspan><tspan fill="#ABB2BF"> { ThemeSpec } </tspan><tspan fill="#C678DD">from</tspan><tspan fill="#ABB2BF"> </tspan><tspan fill="#98C379">&quot;./types&quot;</tspan><tspan fill="#ABB2BF">;</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#565C64">/**</tspan><tspan fill="#6F737B"> Greets the user with syntax-rich highlighting </tspan><tspan fill="#565C64">*/</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#C678DD">export</tspan><tspan fill="#ABB2BF"> </tspan><tspan fill="#E5C07B">function</tspan><tspan fill="#ABB2BF"> </tspan><tspan fill="#61AFEF">greet</tspan><tspan fill="#ABB2BF">(</tspan><tspan fill="#E06C75">name</tspan><tspan fill="#ABB2BF">: </tspan><tspan fill="#E5C07B">string</tspan><tspan fill="#ABB2BF">, </tspan><tspan fill="#E06C75">count</tspan><tspan fill="#ABB2BF"> = </tspan><tspan fill="#D19A66">1</tspan><tspan fill="#ABB2BF">): </tspan><tspan fill="#E5C07B">string</tspan><tspan fill="#ABB2BF"> {</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#ABB2BF"> </tspan><tspan fill="#E5C07B">const</tspan><tspan fill="#ABB2BF"> message = </tspan><tspan fill="#98C379">`Hello, ${</tspan><tspan fill="#ABB2BF">name</tspan><tspan fill="#98C379">}!`</tspan><tspan fill="#ABB2BF">;</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#ABB2BF"> </tspan><tspan fill="#C678DD">if</tspan><tspan fill="#ABB2BF"> (count &gt; </tspan><tspan fill="#D19A66">1</tspan><tspan fill="#ABB2BF">) {</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#ABB2BF"> </tspan><tspan fill="#C678DD">return</tspan><tspan fill="#ABB2BF"> </tspan><tspan fill="#61AFEF">Array</tspan><tspan fill="#ABB2BF">(count)</tspan><tspan fill="#ABB2BF">.</tspan><tspan fill="#61AFEF">fill</tspan><tspan fill="#ABB2BF">(message)</tspan><tspan fill="#ABB2BF">.</tspan><tspan fill="#61AFEF">join</tspan><tspan fill="#ABB2BF">(</tspan><tspan fill="#98C379">&quot; &quot;</tspan><tspan fill="#ABB2BF">);</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#ABB2BF"> }</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#ABB2BF"> </tspan><tspan fill="#C678DD">return</tspan><tspan fill="#ABB2BF"> message;</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#ABB2BF">}</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#E5C07B">const</tspan><tspan fill="#ABB2BF"> numbers = [</tspan><tspan fill="#D19A66">1</tspan><tspan fill="#ABB2BF">, </tspan><tspan fill="#D19A66">2.5</tspan><tspan fill="#ABB2BF">, </tspan><tspan fill="#D19A66">0xff</tspan><tspan fill="#ABB2BF">];</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#E5C07B">const</tspan><tspan fill="#ABB2BF"> pattern =</tspan><tspan fill="#56B6C2"> /</tspan><tspan fill="#C678DD">^</tspan><tspan fill="#D19A66">[a-z]</tspan><tspan fill="#ABB2BF">+</tspan><tspan fill="#C678DD">$</tspan><tspan fill="#56B6C2">/</tspan><tspan fill="#ABB2BF">;</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#E5C07B">const</tspan><tspan fill="#ABB2BF"> ok: </tspan><tspan fill="#E5C07B">boolean</tspan><tspan fill="#ABB2BF"> = numbers.length &gt; </tspan><tspan fill="#D19A66">0</tspan><tspan fill="#ABB2BF">;</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#E5C07B">class</tspan><tspan fill="#ABB2BF"> </tspan><tspan fill="#E5C07B">ThemeBuilder</tspan><tspan fill="#ABB2BF"> {</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#ABB2BF"> </tspan><tspan fill="#C678DD">readonly</tspan><tspan fill="#ABB2BF"> id: </tspan><tspan fill="#E5C07B">string</tspan><tspan fill="#ABB2BF">;</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#ABB2BF"> </tspan><tspan fill="#E5C07B">constructor</tspan><tspan fill="#ABB2BF">(</tspan><tspan fill="#E06C75">id</tspan><tspan fill="#ABB2BF">: </tspan><tspan fill="#E5C07B">string</tspan><tspan fill="#ABB2BF">) {</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#ABB2BF"> </tspan><tspan fill="#D19A66">this</tspan><tspan fill="#ABB2BF">.</tspan><tspan fill="#E06C75">id</tspan><tspan fill="#ABB2BF"> = id;</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#ABB2BF"> }</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#ABB2BF"> </tspan><tspan fill="#61AFEF">build</tspan><tspan fill="#ABB2BF">(</tspan><tspan fill="#E06C75">theme</tspan><tspan fill="#ABB2BF">: </tspan><tspan fill="#E5C07B">ThemeSpec</tspan><tspan fill="#ABB2BF">): </tspan><tspan fill="#E5C07B">Record</tspan><tspan fill="#ABB2BF">&lt;</tspan><tspan fill="#E5C07B">string</tspan><tspan fill="#ABB2BF">, </tspan><tspan fill="#E5C07B">string</tspan><tspan fill="#ABB2BF">&gt; {</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#ABB2BF"> </tspan><tspan fill="#C678DD">return</tspan><tspan fill="#ABB2BF"> { </tspan><tspan fill="#E06C75">background</tspan><tspan fill="#ABB2BF">: theme.base30.</tspan><tspan fill="#E06C75">black</tspan><tspan fill="#ABB2BF"> };</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#ABB2BF"> }</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#ABB2BF">}</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#C678DD">export</tspan><tspan fill="#ABB2BF"> </tspan><tspan fill="#C678DD">default</tspan><tspan fill="#ABB2BF"> new </tspan><tspan fill="#61AFEF">ThemeBuilder</tspan><tspan fill="#ABB2BF">(</tspan><tspan fill="#98C379">&quot;kanagawa&quot;</tspan><tspan fill="#ABB2BF">);</tspan></tspan></text></svg>