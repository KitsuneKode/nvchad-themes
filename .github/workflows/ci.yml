name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run import:base46 --check
      - run: bun run build
      - run: bun test
      - run: bun run goldens --check
      - run: bun run package
      - run: bun run previews:check
      - run: bun run verify
      - name: CI artifact summary
        run: |
          echo "Distribution artifact: nvchad-themes-dist (download from Actions run summary)"
          ls -la dist/
      - run: unzip -l dist/*.vsix | grep -c "color-theme.json"
      - uses: actions/upload-artifact@v4
        with:
          name: nvchad-themes-dist
          path: dist/
