<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420">
  <rect width="100%" height="100%" fill="#282828"/>
  <text font-family="ui-monospace,Menlo,Consolas,monospace" font-size="13">
    <tspan x="16" dy="29"><tspan fill="#4E4E4E">// NvChad theme preview sample</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#D3869B">import</tspan><tspan fill="#EBDBB2"> { </tspan><tspan fill="#D5C4A1">ThemeSpec</tspan><tspan fill="#EBDBB2"> } </tspan><tspan fill="#D3869B">from</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#B8BB26">&quot;./types&quot;</tspan><tspan fill="#EBDBB2">;</tspan></tspan>
    <tspan x="16" dy="19.5"></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#4E4E4E">/**</tspan><tspan fill="#505050"> Greets the user with syntax-rich highlighting </tspan><tspan fill="#4E4E4E">*/</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#D3869B">export</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#FABD2F">function</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#83A598">greet</tspan><tspan fill="#EBDBB2">(</tspan><tspan fill="#FB4934">name</tspan><tspan fill="#83A598">:</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#FABD2F">string</tspan><tspan fill="#EBDBB2">, </tspan><tspan fill="#FB4934">count</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#83A598">=</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#FE8019">1</tspan><tspan fill="#EBDBB2">)</tspan><tspan fill="#83A598">:</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#FABD2F">string</tspan><tspan fill="#EBDBB2"> {</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#EBDBB2">  </tspan><tspan fill="#FABD2F">const</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#D5C4A1">message</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#83A598">=</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#B8BB26">`Hello, ${</tspan><tspan fill="#D5C4A1">name</tspan><tspan fill="#B8BB26">}!`</tspan><tspan fill="#EBDBB2">;</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#EBDBB2">  </tspan><tspan fill="#D3869B">if</tspan><tspan fill="#EBDBB2"> (</tspan><tspan fill="#D5C4A1">count</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#83A598">&gt;</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#FE8019">1</tspan><tspan fill="#EBDBB2">) {</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#EBDBB2">    </tspan><tspan fill="#D3869B">return</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#83A598">Array</tspan><tspan fill="#EBDBB2">(</tspan><tspan fill="#D5C4A1">count</tspan><tspan fill="#EBDBB2">)</tspan><tspan fill="#83A598">.fill</tspan><tspan fill="#EBDBB2">(</tspan><tspan fill="#D5C4A1">message</tspan><tspan fill="#EBDBB2">)</tspan><tspan fill="#83A598">.join</tspan><tspan fill="#EBDBB2">(</tspan><tspan fill="#B8BB26">&quot; &quot;</tspan><tspan fill="#EBDBB2">);</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#EBDBB2">  }</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#EBDBB2">  </tspan><tspan fill="#D3869B">return</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#D5C4A1">message</tspan><tspan fill="#EBDBB2">;</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#EBDBB2">}</tspan></tspan>
    <tspan x="16" dy="19.5"></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#FABD2F">const</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#D5C4A1">numbers</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#83A598">=</tspan><tspan fill="#EBDBB2"> [</tspan><tspan fill="#FE8019">1</tspan><tspan fill="#EBDBB2">, </tspan><tspan fill="#FE8019">2.5</tspan><tspan fill="#EBDBB2">, </tspan><tspan fill="#FE8019">0xff</tspan><tspan fill="#EBDBB2">];</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#FABD2F">const</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#D5C4A1">pattern</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#83A598">=</tspan><tspan fill="#8EC07C"> /</tspan><tspan fill="#D3869B">^</tspan><tspan fill="#FE8019">[a-z]</tspan><tspan fill="#83A598">+</tspan><tspan fill="#D3869B">$</tspan><tspan fill="#8EC07C">/</tspan><tspan fill="#EBDBB2">;</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#FABD2F">const</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#D5C4A1">ok</tspan><tspan fill="#83A598">:</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#FABD2F">boolean</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#83A598">=</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#D5C4A1">numbers</tspan><tspan fill="#83A598">.</tspan><tspan fill="#D5C4A1">length</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#83A598">&gt;</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#FE8019">0</tspan><tspan fill="#EBDBB2">;</tspan></tspan>
    <tspan x="16" dy="19.5"></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#FABD2F">class</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#FABD2F">ThemeBuilder</tspan><tspan fill="#EBDBB2"> {</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#EBDBB2">  </tspan><tspan fill="#D3869B">readonly</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#D5C4A1">id</tspan><tspan fill="#83A598">:</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#FABD2F">string</tspan><tspan fill="#EBDBB2">;</tspan></tspan>
    <tspan x="16" dy="19.5"></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#EBDBB2">  </tspan><tspan fill="#FABD2F">constructor</tspan><tspan fill="#EBDBB2">(</tspan><tspan fill="#FB4934">id</tspan><tspan fill="#83A598">:</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#FABD2F">string</tspan><tspan fill="#EBDBB2">) {</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#EBDBB2">    </tspan><tspan fill="#FE8019">this</tspan><tspan fill="#83A598">.</tspan><tspan fill="#FB4934">id</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#83A598">=</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#D5C4A1">id</tspan><tspan fill="#EBDBB2">;</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#EBDBB2">  }</tspan></tspan>
    <tspan x="16" dy="19.5"></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#EBDBB2">  </tspan><tspan fill="#83A598">build</tspan><tspan fill="#EBDBB2">(</tspan><tspan fill="#FB4934">theme</tspan><tspan fill="#83A598">:</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#FABD2F">ThemeSpec</tspan><tspan fill="#EBDBB2">)</tspan><tspan fill="#83A598">:</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#FABD2F">Record</tspan><tspan fill="#EBDBB2">&lt;</tspan><tspan fill="#FABD2F">string</tspan><tspan fill="#EBDBB2">, </tspan><tspan fill="#FABD2F">string</tspan><tspan fill="#EBDBB2">&gt; {</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#EBDBB2">    </tspan><tspan fill="#D3869B">return</tspan><tspan fill="#EBDBB2"> { </tspan><tspan fill="#FB4934">background</tspan><tspan fill="#EBDBB2">: </tspan><tspan fill="#D5C4A1">theme</tspan><tspan fill="#83A598">.</tspan><tspan fill="#D5C4A1">base30</tspan><tspan fill="#83A598">.</tspan><tspan fill="#FB4934">black</tspan><tspan fill="#EBDBB2"> };</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#EBDBB2">  }</tspan></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#EBDBB2">}</tspan></tspan>
    <tspan x="16" dy="19.5"></tspan>
    <tspan x="16" dy="19.5"><tspan fill="#D3869B">export</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#D3869B">default</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#83A598">new</tspan><tspan fill="#EBDBB2"> </tspan><tspan fill="#83A598">ThemeBuilder</tspan><tspan fill="#EBDBB2">(</tspan><tspan fill="#B8BB26">&quot;kanagawa&quot;</tspan><tspan fill="#EBDBB2">);</tspan></tspan>
    <tspan x="16" dy="19.5"></tspan>
  </text>
</svg>