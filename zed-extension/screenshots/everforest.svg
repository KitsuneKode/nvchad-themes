<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420"><rect width="100%" height="100%" fill="#2b3339"/><text font-family="ui-monospace,Menlo,Consolas,monospace" font-size="13"><tspan x="16" dy="29"><tspan fill="#545C62">// NvChad theme preview sample</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#E67E80">import</tspan><tspan fill="#D3C6AA"> { ThemeSpec } </tspan><tspan fill="#E67E80">from</tspan><tspan fill="#D3C6AA"> </tspan><tspan fill="#DBBC7F">&quot;./types&quot;</tspan><tspan fill="#D3C6AA">;</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#545C62">/**</tspan><tspan fill="#626A70"> Greets the user with syntax-rich highlighting </tspan><tspan fill="#545C62">*/</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#E67E80">export</tspan><tspan fill="#D3C6AA"> </tspan><tspan fill="#83C092">function</tspan><tspan fill="#D3C6AA"> </tspan><tspan fill="#A7C080">greet</tspan><tspan fill="#D3C6AA">(</tspan><tspan fill="#7FBBB3">name</tspan><tspan fill="#D3C6AA">: </tspan><tspan fill="#83C092">string</tspan><tspan fill="#D3C6AA">, </tspan><tspan fill="#7FBBB3">count</tspan><tspan fill="#D3C6AA"> = </tspan><tspan fill="#D699B6">1</tspan><tspan fill="#D3C6AA">): </tspan><tspan fill="#83C092">string</tspan><tspan fill="#D3C6AA"> {</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#D3C6AA"> </tspan><tspan fill="#83C092">const</tspan><tspan fill="#D3C6AA"> message = </tspan><tspan fill="#DBBC7F">`Hello, ${</tspan><tspan fill="#D3C6AA">name</tspan><tspan fill="#DBBC7F">}!`</tspan><tspan fill="#D3C6AA">;</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#D3C6AA"> </tspan><tspan fill="#E67E80">if</tspan><tspan fill="#D3C6AA"> (count &gt; </tspan><tspan fill="#D699B6">1</tspan><tspan fill="#D3C6AA">) {</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#D3C6AA"> </tspan><tspan fill="#E67E80">return</tspan><tspan fill="#D3C6AA"> </tspan><tspan fill="#A7C080">Array</tspan><tspan fill="#D3C6AA">(count)</tspan><tspan fill="#D3C6AA">.</tspan><tspan fill="#A7C080">fill</tspan><tspan fill="#D3C6AA">(message)</tspan><tspan fill="#D3C6AA">.</tspan><tspan fill="#A7C080">join</tspan><tspan fill="#D3C6AA">(</tspan><tspan fill="#DBBC7F">&quot; &quot;</tspan><tspan fill="#D3C6AA">);</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#D3C6AA"> }</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#D3C6AA"> </tspan><tspan fill="#E67E80">return</tspan><tspan fill="#D3C6AA"> message;</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#D3C6AA">}</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#83C092">const</tspan><tspan fill="#D3C6AA"> numbers = [</tspan><tspan fill="#D699B6">1</tspan><tspan fill="#D3C6AA">, </tspan><tspan fill="#D699B6">2.5</tspan><tspan fill="#D3C6AA">, </tspan><tspan fill="#D699B6">0xff</tspan><tspan fill="#D3C6AA">];</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#83C092">const</tspan><tspan fill="#D3C6AA"> pattern =</tspan><tspan fill="#E69875"> /</tspan><tspan fill="#E67E80">^</tspan><tspan fill="#D699B6">[a-z]</tspan><tspan fill="#D3C6AA">+</tspan><tspan fill="#E67E80">$</tspan><tspan fill="#E69875">/</tspan><tspan fill="#D3C6AA">;</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#83C092">const</tspan><tspan fill="#D3C6AA"> ok: </tspan><tspan fill="#83C092">boolean</tspan><tspan fill="#D3C6AA"> = numbers.length &gt; </tspan><tspan fill="#D699B6">0</tspan><tspan fill="#D3C6AA">;</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#83C092">class</tspan><tspan fill="#D3C6AA"> </tspan><tspan fill="#83C092">ThemeBuilder</tspan><tspan fill="#D3C6AA"> {</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#D3C6AA"> </tspan><tspan fill="#E67E80">readonly</tspan><tspan fill="#D3C6AA"> id: </tspan><tspan fill="#83C092">string</tspan><tspan fill="#D3C6AA">;</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#D3C6AA"> </tspan><tspan fill="#83C092">constructor</tspan><tspan fill="#D3C6AA">(</tspan><tspan fill="#7FBBB3">id</tspan><tspan fill="#D3C6AA">: </tspan><tspan fill="#83C092">string</tspan><tspan fill="#D3C6AA">) {</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#D3C6AA"> </tspan><tspan fill="#D699B6">this</tspan><tspan fill="#D3C6AA">.</tspan><tspan fill="#7FBBB3">id</tspan><tspan fill="#D3C6AA"> = id;</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#D3C6AA"> }</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#D3C6AA"> </tspan><tspan fill="#A7C080">build</tspan><tspan fill="#D3C6AA">(</tspan><tspan fill="#7FBBB3">theme</tspan><tspan fill="#D3C6AA">: </tspan><tspan fill="#83C092">ThemeSpec</tspan><tspan fill="#D3C6AA">): </tspan><tspan fill="#83C092">Record</tspan><tspan fill="#D3C6AA">&lt;</tspan><tspan fill="#83C092">string</tspan><tspan fill="#D3C6AA">, </tspan><tspan fill="#83C092">string</tspan><tspan fill="#D3C6AA">&gt; {</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#D3C6AA"> </tspan><tspan fill="#E67E80">return</tspan><tspan fill="#D3C6AA"> { </tspan><tspan fill="#7FBBB3">background</tspan><tspan fill="#D3C6AA">: theme.base30.</tspan><tspan fill="#7FBBB3">black</tspan><tspan fill="#D3C6AA"> };</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#D3C6AA"> }</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#D3C6AA">}</tspan></tspan> <tspan x="16" dy="19.5"><tspan fill="#E67E80">export</tspan><tspan fill="#D3C6AA"> </tspan><tspan fill="#E67E80">default</tspan><tspan fill="#D3C6AA"> new </tspan><tspan fill="#A7C080">ThemeBuilder</tspan><tspan fill="#D3C6AA">(</tspan><tspan fill="#DBBC7F">&quot;kanagawa&quot;</tspan><tspan fill="#D3C6AA">);</tspan></tspan></text></svg>